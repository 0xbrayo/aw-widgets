name: AWWidgets
options:
  bundleIdPrefix: com.0xbrayo
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"

targets:
  AWWidgets:
    type: application
    platform: macOS
    sources:
      - path: AWWidgets
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.0xbrayo.aw-widgets
        INFOPLIST_FILE: AWWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: AWWidgets/AWWidgets.entitlements
        GENERATE_INFOPLIST_FILE: NO
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        PRODUCT_NAME: AWWidgets
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: AWWidgetsWidget
        embed: true
    entitlements:
      path: AWWidgets/AWWidgets.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true

  AWWidgetsWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: AWWidgetsWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.0xbrayo.aw-widgets.widget
        INFOPLIST_FILE: AWWidgetsWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: AWWidgetsWidget/AWWidgetsWidget.entitlements
        GENERATE_INFOPLIST_FILE: NO
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
        PRODUCT_NAME: AWWidgetsWidget
        SKIP_INSTALL: YES
    entitlements:
      path: AWWidgetsWidget/AWWidgetsWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true

schemes:
  AWWidgets:
    build:
      targets:
        AWWidgets: all
        AWWidgetsWidget: all
    run:
      config: Debug
      executable: AWWidgets
